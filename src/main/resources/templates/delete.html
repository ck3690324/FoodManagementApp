<!DOCTYPE HTML>
<html>
<head>
<title th:text="${title}"></title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="container">
	<h1 class="display-4 mb-4" th:text="${title}"></h1>
	<p th:text="${msg}"></p>

	<form method="post" action="/foods/delete" th:object="${formModel}">
		<input type="hidden" name="id" th:value="*{id}" /> <input
			type="hidden" name="redirectUrl" th:value="${refererUrl}" />
		<ul th:object="${formModel}">
			<li>ID: <span th:text="*{id}"></span></li>

			<th:block th:each="fieldName, stat : ${fieldNames}">
				<li><span th:text="${fieldJapaneseNames[stat.index]}"></span>：

					<span th:text="*{__${fieldName}__}"></span></li>
			</th:block>
		</ul>
		<div class="d-flex gap-2">
			<input th:if="${title != 'Delete Error'}" 
           type="submit" class="btn btn-danger" value="Delete" />
			
			<a th:href="@{/foods}" class="btn btn-secondary">Cancel</a>
		</div>
	</form>
</body>

</html>
