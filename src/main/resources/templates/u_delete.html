<!DOCTYPE HTML>
<html>

<head>
	<title th:text="${title}"></title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container">
	<h1 class="display-4 mb-4" th:text="${title}"></h1>
	<p th:text="${msg}"></p>

	<form method="post" action="/users/delete" th:object="${formModel}">
		<input type="hidden" name="id" th:value="*{id}" />
		<ul>
			<li>ユーザーID： <span th:text="*{userId}"></span></li>
		</ul>
		<div class="d-flex align-items-center mb-5">
		<input type="submit" class="btn btn-primary me-4" value="削除" />
	<a class="btn btn-secondary" th:href="@{/users}">キャンセル</a>
	</div>
	</form>
</body>

</html>
